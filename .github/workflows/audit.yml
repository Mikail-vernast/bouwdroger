name: Audit log

on:
  push:
    branches: ["**"]
  pull_request:
    types: [opened, synchronize, reopened, closed]
  delete:

permissions:
  contents: read

jobs:
  log:
    name: Record event
    runs-on: ubuntu-latest
    steps:
      - name: Print event metadata
        env:
          EVENT_NAME: ${{ github.event_name }}
          ACTOR: ${{ github.actor }}
          REF: ${{ github.ref }}
          SHA: ${{ github.sha }}
          REPO: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
        run: |
          echo "Event:     $EVENT_NAME"
          echo "Actor:     $ACTOR"
          echo "Ref:       $REF"
          echo "SHA:       $SHA"
          echo "Repo:      $REPO"
          echo "Run ID:    $RUN_ID"
          echo "Triggered: $(date -u +%FT%TZ)"
